services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skillplay
      POSTGRES_PASSWORD: skillplay_dev
      POSTGRES_DB: skillplay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillplay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sandbox:
    build: ./sandbox
    ports:
      - "4001:4001"
    environment:
      PORT: 4001

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://skillplay:skillplay_dev@postgres:5432/skillplay?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      SANDBOX_URL: http://sandbox:4001
      CORS_ORIGIN: http://localhost:8080,http://localhost:3001,http://localhost:5173
      MOCK_PAYMENTS: "true"
      FREE_PLAYS_PER_TOPIC: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sandbox:
        condition: service_started

volumes:
  pgdata:
