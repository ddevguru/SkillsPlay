name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skillplay
          POSTGRES_PASSWORD: skillplay_dev
          POSTGRES_DB: skillplay
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://skillplay:skillplay_dev@localhost:5432/skillplay
      - run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://skillplay:skillplay_dev@localhost:5432/skillplay
      - run: npm test
        working-directory: backend
      - run: npm run lint
        working-directory: backend

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: frontend
      - run: flutter analyze
        working-directory: frontend
      - run: flutter test
        working-directory: frontend

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: admin
      - run: npm run build
        working-directory: admin
        env:
          VITE_API_URL: http://localhost:3000
